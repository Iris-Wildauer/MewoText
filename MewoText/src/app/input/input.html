<div class="InputField" (keydown)="sendInput($event)" tabindex="0">
  <div class="editor">
    @for (row of text(); track $index) {
      <div class="grid-row">{{row.join('')}}</div>
    }
    <div class="cursor"
         [style.top.px]="cy() * lineHeight"
         [style.left]="cx() + 'ch'">
    </div>
  </div>
</div>
